<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#08a7df">
  <link rel="icon" href="/favicon.ico">
  <title>ページが見つかりません｜沖縄県立高校入試 しくみサイト</title>
  <style>
:root{--ink:#333b42;--blue:#08a7df;--blue-dark:#087ab2;--pale:#e8f8ff;--soft:#cceffc;--red:#ff6565;--yellow:#ffc94b;--green:#55b95c}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7fbfd;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;padding:20px}
main{width:min(650px,100%);background:#fff;border:6px solid var(--soft);padding:38px 28px;text-align:center}
.logo{display:flex;justify-content:center;gap:5px;margin-bottom:20px}
.logo i{width:54px;height:54px;display:grid;place-items:center;color:#fff;font-style:normal;font-size:1.8rem;font-weight:900;border-radius:7px}
.logo i:nth-child(1){background:var(--red)}.logo i:nth-child(2){background:var(--yellow);color:#6d5100}.logo i:nth-child(3){background:var(--green)}
h1{font-size:clamp(1.8rem,6vw,2.7rem);margin:0;color:var(--blue-dark)}
p{line-height:1.8}
a{display:inline-block;margin-top:12px;padding:11px 20px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;border-bottom:4px solid #0785b4;border-radius:3px}
small{display:block;margin-top:20px;color:#697a82}
</style>
</head>
<body>
  <main>
    <div class="logo" aria-label="しくみ"><i>し</i><i>く</i><i>み</i></div>
    <h1>ページが見つかりません</h1>
    <p>アドレスが変わったか、入力されたURLが間違っている可能性があります。</p>
    <a href="/">しくみサイトのトップへ戻る</a>
    <small>沖縄県立高校入試 しくみサイト</small>
  </main>
</body>
</html>
